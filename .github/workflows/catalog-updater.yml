name: Catalog Updater

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  update-catalogs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTOMATION_GH_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update catalogs
        run: bun run scripts/update-catalogs.ts
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_GH_TOKEN }}
